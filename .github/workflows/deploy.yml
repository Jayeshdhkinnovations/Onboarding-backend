name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Pull latest code and Deploy
        run: |
          cd /root/Onboarding-backend
          git checkout main
          git pull origin main
          npm install
          npm run build
          pm2 restart onboarding-backend || pm2 start dist/server.js --name "onboarding-backend"
